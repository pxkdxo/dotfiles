# user-tmpfiles.d/10-run.conf: symlink user runtime directory
# see tmpfiles.d(5), systemd-tmpfiles(8)

# Type	Path		Mode	UID	GID	Age	Argument

# Link ~/.local/run to XDG_RUNTIME_DIR (create-only: this path should only
# ever be a symlink, and `L` cannot delete a real directory if one appears)
L	%h/.local/run	-	-	-	-	%t

# Link ~/.local/mnt to /run/media/<USER>
L	%h/.local/mnt	-	-	-	-	/run/media/%u

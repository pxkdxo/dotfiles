# user-tmpfiles.d/10-state.conf: the physical state tree at ~/.local/var
# see tmpfiles.d(5), 20-var.conf (literal-path rule, path ownership)

# Type	Path			Mode	UID	GID	Age	Argument

# Create XDG_STATE_HOME (physical; environment.d points here)
d	%h/.local/var		0700	-	-	-

# Create the log directory with age-based cleanup of its contents
d	%h/.local/var/log	0700	-	-	~1w

# user-tmpfiles.d/00-local.conf: manage a user directory hierarchy at ~/.local
# see tmpfiles.d(5), user-tmpfiles.d/20-var.conf (path-ownership table)

# Type	Path		Mode	UID	GID	Age	Argument

# Create ~/.local
d	%h/.local	0700	-	-	-

# Copy legacy ~/.bin to ~/.local/bin; also creates the directory when no
# ~/.bin exists, so no separate `d` line (systemd-tmpfiles would silently
# ignore a second line for the same path anyway)
C=-	%h/.local/bin	0700	-	-	-	%h/.bin/

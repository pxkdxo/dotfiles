# user-tmpfiles.d/00-local.conf: manage a user directory hierarchy at ~/.local
# see tmpfiles.d(5), user-tmpfiles.d/20-var.conf (path-ownership table)

# Type	Path		Mode	UID	GID	Age	Argument

# Create ~/.local
d	%h/.local	0700	-	-	-

# Copy legacy ~/.bin to ~/.local/bin; C also creates the dir when ~/.bin is
# absent (a separate `d` line would be ignored as a duplicate path)
C=-	%h/.local/bin	0700	-	-	-	%h/.bin/

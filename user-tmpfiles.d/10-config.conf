# user-tmpfiles.d/10-config.conf: alias ~/.config to XDG_CONFIG_HOME
# see tmpfiles.d(5), 20-var.conf (literal-path rule, path ownership)
#
# Create-only: a real ~/.config is never touched at login; migration is
# install-dotfiles.sh's job. No `d` line for ~/.local/etc -- the installer
# owns it and may make it a symlink, on which a `d` line fails every login.

# Type	Path		Mode	UID	GID	Age	Argument

# Link ~/.config to XDG_CONFIG_HOME (create-only; never replaces)
L	%h/.config	-	-	-	-	%h/.local/etc

# user-tmpfiles.d/10-config.conf: alias ~/.config to XDG_CONFIG_HOME
# see tmpfiles.d(5), systemd-tmpfiles(8)
#
# Non-destructive by design: `L` creates the compat link only when ~/.config
# does not already exist. A real ~/.config is never copied or removed at login
# -- install-dotfiles.sh owns that migration (guarded, refuses when both trees
# are populated). ~/.local/etc itself is also created by the installer: no `d`
# line here, because the installer may create it as a symlink to a repo
# checkout elsewhere, and a `d` line on a symlink fails on every login.
#
# Paths are literal (%h only) rather than %-specifiers that resolve through
# environment.d: with XDG_* redefined there, env-sensitive specifiers can
# resolve to self-referential links that destroy the tree they alias.

# Type	Path		Mode	UID	GID	Age	Argument

# Link ~/.config to XDG_CONFIG_HOME (create-only; never replaces)
L	%h/.config	-	-	-	-	%h/.local/etc

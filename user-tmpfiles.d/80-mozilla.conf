# user-tmpfiles.d/80-mozilla.conf: cache-backed ~/.mozilla relocation
# see tmpfiles.d(5), user-tmpfiles.d/20-var.conf (why paths are literal)
#
# The old `L+` here carried the same hazard as the ~/.config relocation: when
# the cache copy already exists, `C` skips the copy and `L+` deletes the real
# ~/.mozilla profile. Now create-only: on a home where ~/.mozilla is a real
# directory the alias is simply skipped (firefox keeps using it; the cache
# copy sits unused) -- migrate deliberately, not at login.

# Type  Path                        Mode    UID   GID   Age   Argument

# Copy ~/.mozilla to the cache tree (only when the copy does not exist yet)
C       %h/.local/var/cache/mozilla 0700    -     -     -     %h/.mozilla/

# Symlink ~/.mozilla to the cache copy (create-only; never replaces)
L       %h/.mozilla                 -       -     -     -     %h/.local/var/cache/mozilla

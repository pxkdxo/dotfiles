# user-tmpfiles.d/80-mozilla.conf: cache-backed ~/.mozilla relocation
# see tmpfiles.d(5), user-tmpfiles.d/20-var.conf (why paths are literal)
#
# No copy line: the old C/L+ pair carried the same destroy-on-collision
# hazard as the ~/.config relocation, and a C line whose source is the alias
# symlink itself copies that symlink onto its own target, creating an ELOOP
# on the second run (observed). tmpfiles only provides the real destination
# and the create-only alias; migrating an existing real ~/.mozilla profile
# into the cache tree is a deliberate one-time act, not a login side effect.

# Type  Path                        Mode    UID   GID   Age   Argument

# Create the real cache-tree destination
d       %h/.local/var/cache/mozilla 0700    -     -     -

# Symlink ~/.mozilla to it (create-only; never replaces a real profile dir)
L       %h/.mozilla                 -       -     -     -     %h/.local/var/cache/mozilla

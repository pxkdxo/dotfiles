# user-tmpfiles.d/80-mozilla.conf: cache-backed ~/.mozilla relocation
# see tmpfiles.d(5), 20-var.conf (literal-path rule)
#
# No copy line: a `C` whose source is the alias symlink copies it onto its
# own target (ELOOP on the second run). Migrating a real ~/.mozilla profile
# is a deliberate one-time act, not a login side effect.

# Type  Path                        Mode    UID   GID   Age   Argument

# Create the real cache-tree destination
d       %h/.local/var/cache/mozilla 0700    -     -     -

# Symlink ~/.mozilla to it (create-only; never replaces a real profile dir)
L       %h/.mozilla                 -       -     -     -     %h/.local/var/cache/mozilla

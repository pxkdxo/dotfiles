# user-tmpfiles.d/20-var.conf: the ~/.local/var tree and its compat aliases
# see tmpfiles.d(5), systemd-tmpfiles(8)
#
# ~/.local/var IS the physical state tree (environment.d sets XDG_STATE_HOME
# to it). The old lines here aliased var -> %S / var/cache -> %C, but those
# specifiers resolve through environment.d in the user manager, where they
# point back at these very paths: systemd-tmpfiles then deletes the real
# directory and creates a self-referential symlink (verified on systemd 255).
# Hence: literal paths only, physical `d` for data-bearing dirs, create-only
# `L` for the default-location aliases (never `L+` on a path that can hold
# real data). On homes where ~/.cache / ~/.local/state already exist as real
# directories, the aliases are skipped here; install-dotfiles.sh migrates.
#
# Path ownership (each path appears in exactly ONE user-tmpfiles.d file --
# systemd-tmpfiles silently ignores duplicate paths, first sorted file wins):
#   ~/.local/var, ~/.local/var/log   -> 10-state.conf
#   ~/.local/var/tmp                 -> 10-tmp.conf (carries age cleanup)
#   ~/.local/var/cache + aliases     -> this file

# Type	Path			Mode	UID	GID	Age	Argument

# Create the physical cache directory
d	%h/.local/var/cache	0700	-	-	-

# Alias the default cache location to it (create-only; never replaces)
L	%h/.cache		-	-	-	-	%h/.local/var/cache

# Alias the default state location to the var tree (create-only)
L	%h/.local/state		-	-	-	-	%h/.local/var

# Link ~/.local/var/run to XDG_RUNTIME_DIR (ephemeral target; create-only)
L	%h/.local/var/run	-	-	-	-	%t

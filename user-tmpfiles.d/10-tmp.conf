# user-tmpfiles.d/10-tmp.conf: user temporary directory at ~/.local/var/tmp
# see tmpfiles.d(5), 20-var.conf (literal-path rule); this file owns the
# path so the age-based cleanup is what applies

# Type	Path					Mode	UID	GID	Age	Argument

# Create TMPDIR with the sticky bit set and an age limit on its contents
d	%h/.local/var/tmp			01700	-	-	1d

# Remove top-level private temporary directories on boot
R!	%h/.local/var/tmp/systemd-private-*

# Exclude namespace mountpoints created with PrivateTmp=yes from age-based cleanup
x	%h/.local/var/tmp/systemd-private-%b-*	-	-	-	-
X	%h/.local/var/tmp/systemd-private-%b-*/tmp	-	-	-	-

# cyberdream theme for foot — dark + light in one file.
# foot switches between these sections live: SIGUSR1 -> dark, SIGUSR2 -> light
# (see foot.ini initial-color-theme). alpha is per-section.
# Palettes mirror colorschemes/foot/cyberdream{,-light}.ini.


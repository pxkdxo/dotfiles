# Adapted from Tokyo Night (tokyonight.nvim / iTerm2-Color-Schemes)

colors:
  black: "1a1b26"
  green: "9ece6a"
  blue: "7aa2f7"
  purple: "bb9af7"
  red: "f7768e"
  yellow: "e0af68"
  cyan: "7dcfff"
  pink: "bb9af7"
  orange: "e0af68"
  white: "c0caf5"
  base01: "414868"


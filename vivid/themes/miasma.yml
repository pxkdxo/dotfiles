# Adapted from Miasma (iTerm2-Color-Schemes)

colors:
  black: "222222"
  green: "5f875f"
  blue: "78824b"
  purple: "bb7744"
  red: "685742"
  yellow: "b36d43"
  cyan: "c9a554"
  pink: "bb7744"
  orange: "b36d43"
  white: "c2c2b0"
  base01: "666666"

core:
  normal_text:
    foreground: white

  regular_file:
    foreground: white

  reset_to_normal:
    foreground: orange

  directory:
    foreground: blue

  symlink:
    foreground: cyan

  multi_hard_link: {}

  fifo:
    foreground: yellow
    background: black

  socket:
    foreground: pink
    background: black
    font-style: bold

  door:
    foreground: pink
    background: black
    font-style: bold

  block_device:
    foreground: yellow
    background: black
    font-style: bold

  character_device:
    foreground: yellow
    background: black

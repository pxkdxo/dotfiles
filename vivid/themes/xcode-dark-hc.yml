# Adapted from Xcode Dark hc (iTerm2-Color-Schemes)

colors:
  black: "1f1f24"
  green: "83c9bc"
  blue: "4ec4e6"
  purple: "ff85b8"
  red: "ff8a7a"
  yellow: "d9c668"
  cyan: "cda1ff"
  pink: "ff85b8"
  orange: "ffa14f"
  white: "ffffff"
  base01: "838991"

core:
  normal_text:
    foreground: white

  regular_file:
    foreground: white

  reset_to_normal:
    foreground: orange

  directory:
    foreground: blue

  symlink:
    foreground: cyan

  multi_hard_link: {}

  fifo:
    foreground: yellow
    background: black

  socket:
    foreground: pink
    background: black
    font-style: bold

  door:
    foreground: pink
    background: black
    font-style: bold

  block_device:
    foreground: yellow
    background: black
    font-style: bold

  character_device:
    foreground: yellow
    background: black
    font-style: bold

  broken_symlink:
    foreground: red
    background: black
    font-style: bold

  missing_symlink_target:
    foreground: red
    background: black

  setuid:
    foreground: white
    background: red

  setgid:
    foreground: black
    background: yellow

  file_with_capability: {}

  sticky_other_writable:
    foreground: black
    background: green

  other_writable:
    foreground: purple
    background: green

  sticky:
    foreground: white
    background: purple

  executable_file:
    foreground: green

text:
  special:
    foreground: orange

  todo:
    foreground: orange
    font-style: bold

  licenses:
    foreground: orange

  configuration:
    foreground: orange

  other:
    foreground: orange

markup:
  foreground: orange

programming:
  foreground: orange

media:
  image:
    foreground: cyan

  audio:
    foreground: yellow

  video:
    foreground: yellow
    font-style: bold

  fonts:
    foreground: orange

  3d:
    foreground: pink

office:
  foreground: green

archives:
  foreground: purple
  font-style: bold

executable:
  foreground: green

unimportant:
  foreground: base01

# gpg-agent.conf : gpg-agent user configuration file
# see gpg-agent(1)

# Do not enable features that use an external cache for passwords
no-allow-external-cache

# Seconds a cache entry is valid (timer resets upon access)
default-cache-ttl     3600
default-cache-ttl-ssh 3600
max-cache-ttl         21600
max-cache-ttl-ssh     21600

# Allow passphrases from stdin (use ``--pinentry-mode loopback'')
allow-loopback-pinentry

# Pinentry binary: left to gpgconf's per-platform default so this config works
# on macOS (pinentry-mac / Homebrew) as well as Linux. A hardcoded
# /usr/bin/pinentry does not exist on macOS. Uncomment and set explicitly if a
# specific pinentry is required:
#pinentry-program /usr/bin/pinentry

# Enable SSH authentication via gpg-agent
enable-ssh-support

# vim:ft=gpg:tw=0

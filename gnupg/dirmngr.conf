# ~/.gnupg/dirmngr.conf
# Configuration file for dirmngr
# See dirmngr(1) for more information

# The former SKS pool and its mirrors (sks-keyservers.net, keys.gnupg.net,
# pgp.mit.edu) are defunct or unreliable. keys.openpgp.org is verifying,
# abuse-resistant, and served over hkps.
keyserver hkps://keys.openpgp.org

# Light statusline theme — mirrors theme-dark.conf on a cyberdream-light palette
# (bg #eaeaea, fg #16181a, purple #a018ff, magenta #d100bf, block #acacac) to
# match VIVID_THEME=cyberdream-light. Sourced when $TERM_BACKGROUND=light.
# Tweak the hexes to taste.

set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#d100bf,bg=#eaeaea"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#a018ff"
set -g status-style "none,bg=#eaeaea"
set -g message-style "fg=#d100bf,bg=#eaeaea"
set -g pane-border-style "fg=#acacac"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#a018ff,bg=#eaeaea"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#16181a,bg=#eaeaea"
set -g status-left "#[fg=#ffffff,bg=#a018ff] #S #[fg=#a018ff,bg=#eaeaea,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#acacac,bg=#eaeaea,nobold,nounderscore,noitalics]#[fg=#16181a,bg=#acacac] %R  %a  %Y #[fg=#a018ff,bg=#acacac,nobold,nounderscore,noitalics]#[fg=#ffffff,bg=#a018ff] #H "
setw -g window-status-format "#[fg=#eaeaea,bg=#eaeaea,nobold,nounderscore,noitalics]#[default] #I  #W #[fg=#eaeaea,bg=#eaeaea,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#eaeaea,bg=#acacac,nobold,nounderscore,noitalics]#[fg=#d100bf,bg=#acacac] #I  #W  #F #[fg=#acacac,bg=#eaeaea,nobold,nounderscore,noitalics]"

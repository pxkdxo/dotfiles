# Dark statusline theme (originally generated by tmuxline.vim).
# Sourced by zshrc's term-bg-resync when $TERM_BACKGROUND=dark; see theme-light.conf.

set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#ff5fd7,bg=#242322"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#4f3598"
set -g status-style "none,bg=#4a4a4a"
set -g message-style "fg=#ff5fd7,bg=#242322"
set -g pane-border-style "fg=#242322"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#4f3598,bg=#4a4a4a"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#e2e2e2,bg=#4a4a4a"
set -g status-left "#[fg=#e2e2e2,bg=#4f3598] #S #[fg=#4f3598,bg=#4a4a4a,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#242322,bg=#4a4a4a,nobold,nounderscore,noitalics]#[fg=#ff5fd7,bg=#242322] %R  %a  %Y #[fg=#4f3598,bg=#242322,nobold,nounderscore,noitalics]#[fg=#e2e2e2,bg=#4f3598] #H "
setw -g window-status-format "#[fg=#4a4a4a,bg=#4a4a4a,nobold,nounderscore,noitalics]#[default] #I  #W #[fg=#4a4a4a,bg=#4a4a4a,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#4a4a4a,bg=#242322,nobold,nounderscore,noitalics]#[fg=#ff5fd7,bg=#242322] #I  #W  #F #[fg=#242322,bg=#4a4a4a,nobold,nounderscore,noitalics]"

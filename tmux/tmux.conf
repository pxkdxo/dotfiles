# ~/.tmux.conf : tmux configuration file

# Increase scrollback buffer size (default: 2000)
set -g history-limit 5000

# Increase tmux messages display duration (default: 750ms)
set -g display-time 2500

# Refresh 'status-left' and 'status-right' more often (default: 15s)
set -g status-interval 5

# renumber windows when a window is closed
set -g renumber-windows on

# rename window to reflect current program
setw -g automatic-rename on

# Enable 24-bit color
set -ag terminal-overrides ',*-truecolor:Tc'
set -ag terminal-overrides ',alacritty*:Tc,*-alacritty:Tc'
set -ag terminal-overrides ',foot*:Tc,*-foot*:Tc'
set -ag terminal-overrides ',ghostty*:Tc,*-ghostty:Tc'
set -ag terminal-overrides ',kitty*:Tc,*-kitty:Tc'
set -ag terminal-overrides ',konsole*:Tc,*-konsole:Tc'
set -ag terminal-overrides ',mintty*:Tc,*-mintty:Tc'
set -ag terminal-overrides ',iterm2*:Tc,*-iterm2:Tc'
set -ag terminal-overrides ',st*:Tc,*-st:Tc'
set -ag terminal-overrides ',wezterm*:Tc,*-wezterm:Tc'

# Set extended keys format
# set -g extended-keys-format csi-u

# Enforce terminal features
%if "#{||:#{!=:#{XTERM_VERSION},},#{m/ri:^xterm(-.+)?$,#{TERM}}}"
set -as terminal-features ',xterm-*:clipboard:extkeys:focus:hyperlinks:mouse:title'
set -g extended-keys on
%endif
%if "#{m/ri:^(.+-)?alacritty(-.+)?$,#{TERM}}"
set -as terminal-features ',alacritty*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough'
set -as terminal-features ',*-alacritty:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?foot(-.+)?$,#{TERM}}"
set -as terminal-features ',foot*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough'
set -as terminal-features ',*-foot:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?ghostty(-.+)?$,#{TERM}}"
set -as terminal-features ',ghostty*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -as terminal-features ',*-ghostty:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?iterm2(-.+)?$,#{TERM}}"
set -as terminal-features ',iterm2*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -as terminal-features ',*-iterm2:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?kitty(-.+)?$,#{TERM}}"
set -as terminal-features ',kitty*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -as terminal-features ',*-kitty:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?konsole(-.+)?$,#{TERM}}"
set -as terminal-features ',konsole*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title'
set -as terminal-features ',*-konsole:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?mintty(-.+)?$,#{TERM}}"
set -as terminal-features ',mintty*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title'
set -as terminal-features ',*-mintty:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?st(-.+)?$,#{TERM}}"
set -as terminal-features ',st*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough'
set -as terminal-features ',*-st:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough'
set -g extended-keys on
%elif "#{m/ri:^(.+-)?wezterm(-.+)?$,#{TERM}}"
set -as terminal-features ',wezterm*:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -as terminal-features ',*-wezterm:clipboard:RGB:ccolour:cstyle:extkeys:focus:hyperlinks:mouse:strikethrough:title:usstyle'
set -g extended-keys on
%endif
set -as terminal-features ",*:256"

# Enable mouse and clipboard
set -g mouse on
set -g set-clipboard external

# Register terminal focus events
set -g focus-events on

# Set a modern terminal type
set -g default-terminal 'tmux-256color'

# Update terminal titles
set -g set-titles on
set -g set-titles-string '#T'

# Ensure UTF-8 for encoding the statusbar
set -g status on

# Enable window notifications
set -g visual-activity on
setw -g monitor-activity on

# Set the selection style
set -wg mode-style 'bg=black fg=default italics'

# Count from one
set -g base-index 1
setw -g pane-base-index 1

# Fix for vim-mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 50

# Use vi key bindings in tmux command prompt `'<Prefix>:'`
set -g status-keys vi

# Enable vim-style keybindings
set -g mode-keys vi

# Set prefix key: M-Backslash
unbind C-b
set -g prefix M-\\
bind -n M-\\ send-prefix

# Prefix + Prefix to detach tmux client
unbind d
bind M-\\ detach-client

# Prefix + M-t to create a new window
unbind c
bind M-t new-window -c "#{pane_current_path}"
# #

# M-S-t to create a window (no prefix)
bind -n M-T new-window -c "#{pane_current_path}"
# #

# Prefix + M-p and Prefix + M-n to cycle through windows 
unbind p
bind -r M-p select-window -p

unbind n
bind -r M-n select-window -n

# Prefix + Ctrl-^ to switch to the previously selected window
bind C-^ select-window -l

# M-PgUp and M-PgDn to cycle through windows (no prefix)
bind -r -n M-PgUp select-window -n
bind -r -n M-PgDn select-window -p

# Prefix + M-v and Prefix + M-x to split panes with ease
unbind '"'
bind M-v {
  split-window -h -c "#{pane_current_path}"
}
unbind '%'
bind M-x {
  split-window -v -c "#{pane_current_path}"
}

# M-S-x and M-S-x to split panes (no prefix)
bind -r M-V {
  split-window -h -c "#{pane_current_path}"
}
bind -r M-X {
  split-window -v -c "#{pane_current_path}"
}

# Prefix + M-{h|j|k|l} to switch panes like vim
bind M-k select-pane -U
bind M-j select-pane -D
bind M-l select-pane -R
bind M-h select-pane -L

# M-S-{Up|Down|<Right><Left>} to switch panes (no prefix)
bind -n M-S-Up select-pane -U
bind -n M-S-Down select-pane -D
bind -n M-S-Right select-pane -R
bind -n M-S-Left select-pane -L

# Resize panes like vim (Prefix + {H|J|K|L})
bind -r M-K resize-pane -U 5
bind -r M-J resize-pane -D 5
bind -r M-L resize-pane -R 5
bind -r M-H resize-pane -L 5

# M-S-{H|J|K|L} to resize panes (no prefix)
bind -r -n M-K resize-pane -U 5
bind -r -n M-J resize-pane -D 5
bind -r -n M-H resize-pane -R 5
bind -r -n M-L resize-pane -L 5

# Prefix + C-r to reload config file
bind-key M-r {
  if-shell 'test -f ~/.tmux.conf' {
    source-file ~/.tmux.conf
    display-message "Sourced: ~/.tmux.conf"
  }
  if-shell 'test -f ~/tmux.conf' {
    source-file ~/.tmux.conf
    display-message "Sourced: ~/.tmux.conf"
  }
  %if "#{==:#{XDG_CONFIG_HOME},}"
  if-shell 'test -f ~/.config/tmux.conf' {
    source ~/.config/tmux.conf
    display-message "Sourced: ~/.config/tmux.conf"
  }
  %else
  if-shell 'test -f "${XDG_CONFIG_HOME}/tmux.conf"' {
    source-file "${XDG_CONFIG_HOME}/tmux.conf"
    display-message "Sourced: ${XDG_CONFIG_HOME}/tmux.conf"
  }
  %endif
}

# Prefix + Esc to enter copy-mode 
bind Escape copy-mode

# M-Esc to enter copy-mode (no-prefix)
bind -n M-Escape copy-mode

# Select and copy with 'v' and 'y', respectively
unbind -T copy-mode-vi v
bind -T copy-mode-vi v send-keys -X begin-selection
unbind -T copy-mode-vi y
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '{
  if command -v pbcopy;
  then pbcopy;
  elif test "${XDG_SESSION_TYPE}" = wayland && command -v wl-copy;
  then wl-copy -n;
  elif "${XDG_SESSION_TYPE}" = x11 && command -v xsel;
  then xsel --clipboard --input -n;
  elif "${XDG_SESSION_TYPE}" = x11 && command -v xclip;
  then xclip -selection clipboard -n;
  elif command -v lemonade > /dev/null;
  then lemonade copy;
  elif command -v doitclient > /dev/null;
  then doitclient wclip;
  elif command -v win32yank > /dev/null;
  then win32yank -i;
  else tmux load-buffer -w -;
  fi;
} > /dev/null 2>&1'

# Single click to clear a selection
bind -T copy-mode-vi MouseDown1Pane {
  select-pane
  send-keys -X clear-selection
}

# Disable 'release mouse drag to copy and exit copy-mode'
unbind -T copy-mode-vi MouseDragEnd1Pane

# Begin scrolling with Shift-PageUp
bind -n -r S-PgUp 'copy-mode -eu'

# Load tmuxline config if available
if-shell 'test -f ~/.tmuxline.conf' {
  source-file ~/.tmuxline.conf
}
%if "#{==:#{XDG_CONFIG_HOME},}"
if-shell 'test -f ~/.config/tmuxline.conf' {
  source ~/.config/tmuxline.conf
}
%else
if-shell 'test -f "${XDG_CONFIG_HOME}/tmuxline.conf"' {
  source-file "${XDG_CONFIG_HOME}/tmuxline.conf"
}
%endif

# # Setup tpm plugins (https://github.com/tmux-plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'erikw/tmux-powerline.git'
#
# Initialize tmux plugin manager (keep this line last)
run '~/.tmux/plugins/tpm/tpm'

# vim:ft=tmux:tw=0

# Statusline dispatcher: apply the theme matching the @bg user option. Callers
# set @bg (and @theme_dir) then source this file, so the background -> file
# mapping lives in one place. Used by tmux.conf's baseline and term-bg-resync.
%if "#{==:#{@bg},light}"
source-file -F "#{@theme_dir}/theme-light.conf"
%else
source-file -F "#{@theme_dir}/theme-dark.conf"
%endif
